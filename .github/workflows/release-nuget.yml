name: Release NuGet Package

on:
  push:
    tags:
      - "v*.*.*"
  release:
    types:
      - published
  workflow_dispatch:

permissions:
  contents: read

env:
  DOTNET_NOLOGO: true
  DOTNET_SKIP_FIRST_TIME_EXPERIENCE: true
  CONFIGURATION: Release

jobs:
  pack-and-publish:
    name: Pack and publish
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: |
            8.0.x
            9.0.x
            10.0.x

      - name: Restore
        run: dotnet restore MimeType.sln

      - name: Build
        run: dotnet build MimeType.sln --configuration ${{ env.CONFIGURATION }} --no-restore

      - name: Resolve package version
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "release" ]; then
            VERSION="${{ github.event.release.tag_name }}"
          elif [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            VERSION="${GITHUB_REF_NAME}"
          else
            VERSION="1.0.0-local.${{ github.run_number }}"
          fi

          if [[ "$VERSION" == v* ]]; then
            VERSION="${VERSION#v}"
          fi

          echo "PACKAGE_VERSION=$VERSION" >> "$GITHUB_ENV"

      - name: Pack
        run: dotnet pack MimeType/MimeType.csproj --configuration ${{ env.CONFIGURATION }} --no-build --output artifacts/packages -p:PackageVersion=${{ env.PACKAGE_VERSION }}

      - name: Upload package artifact
        uses: actions/upload-artifact@v4
        with:
          name: nuget-package
          path: artifacts/packages/*.nupkg

      - name: Publish to NuGet
        if: github.event_name == 'release' || startsWith(github.ref, 'refs/tags/v')
        run: dotnet nuget push "artifacts/packages/*.nupkg" --api-key "${{ secrets.NUGET_API_KEY }}" --source https://api.nuget.org/v3/index.json --skip-duplicate
